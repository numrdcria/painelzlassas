services:
  web:
    build: .
    container_name: atendimento_pro_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./instance:/app/instance
    command: sh -lc "python scripts/init_db.py && gunicorn -b 0.0.0.0:${PORT:-8000} wsgi:app"

  db:
    image: postgres:16-alpine
    container_name: atendimento_pro_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: atendimento
      POSTGRES_USER: atendimento
      POSTGRES_PASSWORD: atendimento123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
